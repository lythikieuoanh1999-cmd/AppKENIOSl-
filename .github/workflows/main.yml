name: Build unsigned IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version (e.g. 3.0.1) — để trống thì dùng project.yml'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    env:
      SCHEME: KENIOS
      PROJECT: KENIOS.xcodeproj
      CONFIGURATION: Release
      DERIVED_DATA: ${{ github.workspace }}/build

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Xcode (cần SDK iOS 26 cho GlassKit / Liquid Glass) ──────────────
      - name: Select latest Xcode (26.x / iOS 26 SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print tool versions
        run: |
          xcodebuild -version
          swift --version
          brew --version

      # ── 3. Cache Homebrew packages ──────────────────────────────────────────
      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
          key: brew-xcodegen-${{ runner.os }}-${{ hashFiles('.github/workflows/build-ipa.yml') }}
          restore-keys: brew-xcodegen-${{ runner.os }}-

      # ── 4. Install XcodeGen ─────────────────────────────────────────────────
      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &>/dev/null; then
            brew install xcodegen
          else
            echo "XcodeGen already cached: $(xcodegen --version)"
          fi

      # ── 5. Bump build number & optional marketing version ──────────────────
      - name: Set build number
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

          # Patch project.yml CFBundleVersion
          sed -i '' "s/CFBundleVersion: .*/CFBundleVersion: \"$BUILD_NUMBER\"/" project.yml

          # Override marketing version if provided via workflow_dispatch input
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            sed -i '' "s/CFBundleShortVersionString: .*/CFBundleShortVersionString: \"$INPUT_VERSION\"/" project.yml
            echo "MARKETING_VERSION=$INPUT_VERSION" >> $GITHUB_ENV
          else
            MARKETING_VERSION=$(grep 'CFBundleShortVersionString' project.yml | head -1 | sed 's/.*: *"\(.*\)"/\1/')
            echo "MARKETING_VERSION=$MARKETING_VERSION" >> $GITHUB_ENV
          fi

          echo "→ Version: $MARKETING_VERSION  Build: $BUILD_NUMBER"

      # ── 6. Generate Xcode project ───────────────────────────────────────────
      - name: Generate Xcode project (XcodeGen)
        run: |
          set -eo pipefail
          xcodegen generate
          ls -la

      - name: List available schemes
        run: xcodebuild -list -project $PROJECT

      # ── 7. Build (no code signing) ──────────────────────────────────────────
      - name: Build for iOS device (unsigned)
        run: |
          set -eo pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            -destination "generic/platform=iOS" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build \
          | xcpretty --color --simple || (
            echo "❌ Build failed — showing last 50 lines of raw log"
            xcodebuild \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -configuration "$CONFIGURATION" \
              -sdk iphoneos \
              -derivedDataPath "$DERIVED_DATA" \
              -destination "generic/platform=iOS" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM="" \
              build 2>&1 | tail -50
            exit 1
          )

      # ── 8. Package .app → unsigned .ipa ────────────────────────────────────
      - name: Package unsigned .ipa
        run: |
          set -eo pipefail

          APP_PATH=$(find "$DERIVED_DATA/Build/Products/${CONFIGURATION}-iphoneos" \
            -maxdepth 1 -name "*.app" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ Không tìm thấy file .app — kiểm tra build log bên trên."
            find "$DERIVED_DATA/Build/Products" -maxdepth 3
            exit 1
          fi

          echo "✅ App bundle: $APP_PATH"

          IPA_NAME="KENIOS-v${MARKETING_VERSION}-build${BUILD_NUMBER}-unsigned.ipa"

          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r "$IPA_NAME" Payload > /dev/null
          ls -lh "$IPA_NAME"

          echo "IPA_NAME=$IPA_NAME" >> $GITHUB_ENV

      # ── 9. Upload artifact ──────────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: KENIOS-unsigned-ipa-build${{ github.run_number }}
          path: ${{ env.IPA_NAME }}
          retention-days: 14
          if-no-files-found: error

      # ── 10. Job summary ─────────────────────────────────────────────────────
      - name: Write job summary
        if: success()
        run: |
          echo "## ✅ Build thành công" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Thông tin | Giá trị |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$MARKETING_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build number | \`$BUILD_NUMBER\` |" >> $GITHUB_STEP_SUMMARY
          echo "| IPA | \`$IPA_NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> IPA chưa ký — cần ký lại bằng [AltStore](https://altstore.io/), [Sideloadly](https://sideloadly.io/), hoặc Apple Enterprise cert trước khi cài thiết bị thật." >> $GITHUB_STEP_SUMMARY
